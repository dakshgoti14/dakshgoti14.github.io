<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="DocuMind RAG Document Intelligence">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#150c2e"/><stop offset="0.5" stop-color="#172c54"/><stop offset="1" stop-color="#0f4c81"/></linearGradient>
    <linearGradient id="g-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#080616" stop-opacity="0"/><stop offset="1" stop-color="#080616" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="g-panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="g-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7ad7ff"/><stop offset="1" stop-color="#c08bff"/></linearGradient>
    <linearGradient id="g-shirt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5fbfe8"/><stop offset="0.7" stop-color="#3f9fd0"/><stop offset="1" stop-color="#2a80b0"/></linearGradient>
    <linearGradient id="g-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#f2c199"/></linearGradient>
    <radialGradient id="g-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#c08bff" stop-opacity="0.5"/><stop offset="1" stop-color="#c08bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="g-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05"/></pattern>
    <filter id="g-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#080616" flood-opacity="0.45"/></filter>
    <filter id="g-soft2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#080616" flood-opacity="0.35"/></filter>
    <filter id="g-blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="640" height="420" fill="url(#g-bg)"/>
  <circle cx="450" cy="160" r="165" fill="url(#g-glow)" filter="url(#g-blur)"/>
  <circle cx="110" cy="360" r="120" fill="url(#g-glow)" filter="url(#g-blur)" opacity="0.55"/>
  <rect width="640" height="420" fill="url(#g-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#g-floor)"/>
  <ellipse cx="150" cy="250" rx="140" ry="150" fill="url(#g-spot)"/>
  <g fill="#7ad7ff"><circle cx="330" cy="56" r="2.6" opacity="0.7"/><circle cx="612" cy="300" r="2.2" opacity="0.6"/><circle cx="60" cy="150" r="2" opacity="0.5"/></g>

  <ellipse cx="168" cy="388" rx="115" ry="15" fill="#080616" opacity="0.4"/>

  <!-- ===== Person ===== -->
  <g filter="url(#g-soft)">
    <rect x="142" y="316" width="21" height="74" rx="9" fill="#1e2a44"/>
    <rect x="175" y="316" width="21" height="74" rx="9" fill="#28385c"/>
    <path d="M137,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#101828"/>
    <path d="M170,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#101828"/>
    <path d="M130,214 C130,199 142,190 168,190 C194,190 206,199 206,214 L213,326 C213,335 205,341 196,341 L140,341 C131,341 123,335 123,326 Z" fill="url(#g-shirt)"/>
    <path d="M188,193 C200,197 206,205 206,214 L213,326 C213,335 205,341 196,341 L178,341 Z" fill="#2a80b0" opacity="0.5"/>
    <path d="M168,190 L154,214 L168,230 L182,214 Z" fill="#2a80b0"/>
    <path d="M204,224 C240,214 274,210 300,214" fill="none" stroke="url(#g-shirt)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="306" cy="214" r="11" fill="url(#g-skin)"/><rect x="306" y="209" width="15" height="6" rx="3" fill="url(#g-skin)"/>
    <path d="M132,224 C121,250 121,286 133,312" fill="none" stroke="url(#g-shirt)" stroke-width="19" stroke-linecap="round"/>
    <circle cx="133" cy="316" r="11" fill="url(#g-skin)"/>
    <rect x="159" y="166" width="18" height="26" rx="7" fill="#f2c199"/>
    <circle cx="168" cy="148" r="31" fill="url(#g-skin)"/>
    <circle cx="139" cy="150" r="6" fill="#f2c199"/>
    <path d="M137,150 C135,120 155,108 168,108 C186,108 200,122 199,150 C193,132 182,126 168,126 C152,126 142,134 137,150 Z" fill="#1c1a2a"/>
    <circle cx="159" cy="149" r="2.8" fill="#3a2a20"/><circle cx="177" cy="149" r="2.8" fill="#3a2a20"/>
    <path d="M154,141 q6,-4 11,-1" fill="none" stroke="#1c1a2a" stroke-width="2" stroke-linecap="round"/>
    <path d="M172,140 q5,-3 10,1" fill="none" stroke="#1c1a2a" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="156" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/><ellipse cx="180" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/>
    <path d="M161,161 q7,6 14,0" fill="none" stroke="#c07a4f" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== RAG panel ===== -->
  <g transform="translate(300,120)" filter="url(#g-soft)">
    <rect x="0" y="0" width="300" height="208" rx="18" fill="url(#g-panel)" stroke="#7ad7ff" stroke-opacity="0.3"/>
    <!-- document -->
    <g transform="translate(18,20)"><rect width="72" height="94" rx="8" fill="#ffffff" opacity="0.14"/><rect x="12" y="14" width="48" height="7" rx="3.5" fill="#ffffff" opacity="0.8"/><rect x="12" y="28" width="48" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/><rect x="12" y="40" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/><rect x="12" y="52" width="48" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/><rect x="12" y="70" width="30" height="12" rx="6" fill="url(#g-accent)"/></g>
    <!-- LLM node -->
    <g transform="translate(108,30)"><circle cx="36" cy="36" r="34" fill="#ffffff" opacity="0.10" stroke="#c08bff" stroke-opacity="0.5"/><circle cx="36" cy="36" r="7" fill="#c08bff"/><g fill="#7ad7ff"><circle cx="18" cy="22" r="4"/><circle cx="54" cy="22" r="4"/><circle cx="16" cy="48" r="4"/><circle cx="56" cy="50" r="4"/></g><g stroke="#c08bff" stroke-opacity="0.7"><line x1="36" y1="36" x2="18" y2="22"/><line x1="36" y1="36" x2="54" y2="22"/><line x1="36" y1="36" x2="16" y2="48"/><line x1="36" y1="36" x2="56" y2="50"/></g><text x="36" y="88" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#d6c2ff">LLM · RAG</text></g>
    <!-- answer chat -->
    <g transform="translate(196,20)"><rect width="88" height="94" rx="12" fill="#ffffff" opacity="0.12"/><rect x="12" y="16" width="64" height="8" rx="4" fill="#ffffff" opacity="0.85"/><rect x="12" y="32" width="48" height="7" rx="3.5" fill="#ffffff" opacity="0.5"/><rect x="12" y="46" width="60" height="7" rx="3.5" fill="#ffffff" opacity="0.5"/><circle cx="18" cy="72" r="4" fill="url(#g-accent)"/><text x="28" y="76" font-family="Poppins,Arial,sans-serif" font-size="9" fill="#bcd8ee">cited</text></g>
    <line x1="90" y1="66" x2="106" y2="60" stroke="url(#g-accent)" stroke-width="2.6"/>
    <line x1="180" y1="60" x2="194" y2="60" stroke="url(#g-accent)" stroke-width="2.6"/>
    <!-- stats -->
    <g transform="translate(18,132)"><text x="0" y="20" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="20" fill="#7ad7ff">1M+</text><text x="0" y="38" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#bcd8ee">chunks indexed</text></g>
    <g transform="translate(120,132)"><text x="0" y="20" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="20" fill="#ffffff">92%</text><text x="0" y="38" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#bcd8ee">answer relevance</text></g>
    <text x="18" y="188" font-family="Poppins,Arial,sans-serif" font-size="11" fill="#c08bff">LangChain · pgvector · FastAPI · Next.js</text>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">DocuMind</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="url(#g-accent)"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#bcd8ee">RAG Document Intelligence Platform</text>
</svg>
