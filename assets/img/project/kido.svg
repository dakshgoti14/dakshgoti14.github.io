<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="Kido Learn">
  <defs>
    <linearGradient id="k-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#123a4a"/><stop offset="0.5" stop-color="#1f6f7a"/><stop offset="1" stop-color="#e0873f"/></linearGradient>
    <linearGradient id="k-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a2028" stop-opacity="0"/><stop offset="1" stop-color="#0a2028" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="k-book" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#dfeaf0"/></linearGradient>
    <linearGradient id="k-shirt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff8fb0"/><stop offset="0.7" stop-color="#ff6f9c"/><stop offset="1" stop-color="#e85286"/></linearGradient>
    <linearGradient id="k-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffdcbb"/><stop offset="1" stop-color="#f6c79e"/></linearGradient>
    <radialGradient id="k-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffd166" stop-opacity="0.5"/><stop offset="1" stop-color="#ffd166" stop-opacity="0"/></radialGradient>
    <radialGradient id="k-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="k-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05"/></pattern>
    <filter id="k-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0a2028" flood-opacity="0.4"/></filter>
    <filter id="k-soft2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0a2028" flood-opacity="0.35"/></filter>
    <filter id="k-blur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="640" height="420" fill="url(#k-bg)"/>
  <circle cx="450" cy="150" r="170" fill="url(#k-glow)" filter="url(#k-blur)"/>
  <circle cx="110" cy="360" r="120" fill="url(#k-glow)" filter="url(#k-blur)" opacity="0.5"/>
  <rect width="640" height="420" fill="url(#k-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#k-floor)"/>
  <ellipse cx="175" cy="260" rx="140" ry="140" fill="url(#k-spot)"/>

  <!-- floating letters / shapes -->
  <g filter="url(#k-soft2)" font-family="Poppins,Arial,sans-serif" font-weight="700">
    <g transform="translate(300,84) rotate(-12)"><rect x="-24" y="-24" width="48" height="48" rx="12" fill="#ffd166"/><text x="0" y="12" text-anchor="middle" font-size="30" fill="#12586a">A</text></g>
    <g transform="translate(388,60) rotate(10)"><rect x="-20" y="-20" width="40" height="40" rx="10" fill="#6fd3e0"/><text x="0" y="10" text-anchor="middle" font-size="26" fill="#0e3a45">B</text></g>
    <g transform="translate(560,110) rotate(-8)"><rect x="-22" y="-22" width="44" height="44" rx="11" fill="#8ce0a0"/><text x="0" y="11" text-anchor="middle" font-size="28" fill="#0e3a26">1</text></g>
    <g transform="translate(470,52) rotate(14)"><circle r="20" fill="#ff8fb0"/><text x="0" y="9" text-anchor="middle" font-size="24" fill="#5c1030">2</text></g>
  </g>
  <g stroke="#ffe0a3" stroke-width="2" opacity="0.5" fill="none"><path d="M330,110 q20,20 42,-8" stroke-dasharray="2 8" stroke-linecap="round"/></g>

  <ellipse cx="200" cy="392" rx="130" ry="15" fill="#0a2028" opacity="0.4"/>

  <!-- ===== Child reading (seated) ===== -->
  <g filter="url(#k-soft)">
    <!-- crossed legs -->
    <path d="M120,330 q40,-4 80,0 q10,26 -12,30 l-56,0 q-22,-4 -12,-30 Z" fill="#3a86c9"/>
    <path d="M130,352 q35,10 70,0 l0,10 q-35,8 -70,0 Z" fill="#2f6ea8"/>
    <!-- body -->
    <path d="M132,236 C132,220 148,210 176,210 C204,210 220,220 220,236 L226,326 C226,336 218,342 208,342 L144,342 C134,342 126,336 126,326 Z" fill="url(#k-shirt)"/>
    <path d="M200,213 C214,218 220,226 220,236 L226,326 C226,336 218,342 208,342 L190,342 Z" fill="#e85286" opacity="0.5"/>
    <path d="M176,210 L162,236 L176,250 L190,236 Z" fill="#e85286"/>
    <!-- arms holding book -->
    <path d="M138,246 C124,266 122,292 138,304" fill="none" stroke="url(#k-shirt)" stroke-width="18" stroke-linecap="round"/>
    <path d="M214,246 C228,266 230,292 214,304" fill="none" stroke="url(#k-shirt)" stroke-width="18" stroke-linecap="round"/>
    <!-- neck + head -->
    <rect x="167" y="188" width="18" height="26" rx="7" fill="#f6c79e"/>
    <circle cx="176" cy="168" r="33" fill="url(#k-skin)"/>
    <circle cx="146" cy="170" r="6" fill="#f6c79e"/>
    <!-- hair -->
    <path d="M142,170 C140,136 162,124 176,124 C194,124 210,138 209,172 C202,150 190,142 176,142 C160,142 148,152 142,170 Z" fill="#3a2418"/>
    <path d="M150,150 q26,-14 52,4 q-4,-22 -26,-24 q-22,-2 -26,20 Z" fill="#4a2f1e"/>
    <circle cx="166" cy="170" r="3" fill="#3a2a20"/><circle cx="186" cy="170" r="3" fill="#3a2a20"/>
    <circle cx="167" cy="169" r="1" fill="#fff"/><circle cx="187" cy="169" r="1" fill="#fff"/>
    <ellipse cx="162" cy="180" rx="4.5" ry="3" fill="#ff9f7e" opacity="0.55"/><ellipse cx="190" cy="180" rx="4.5" ry="3" fill="#ff9f7e" opacity="0.55"/>
    <path d="M168,184 q8,7 16,0" fill="none" stroke="#c07a4f" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- open book -->
  <g transform="translate(122,286)" filter="url(#k-soft)">
    <path d="M54,10 C34,-2 8,-2 -8,8 L-8,74 C8,64 34,64 54,76 C74,64 100,64 116,74 L116,8 C100,-2 74,-2 54,10 Z" fill="url(#k-book)"/>
    <path d="M54,10 L54,76" stroke="#c4d4dc" stroke-width="2.5"/>
    <g stroke="#9fb6c0" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="24" x2="44" y2="24"/><line x1="6" y1="36" x2="40" y2="36"/><line x1="6" y1="48" x2="44" y2="48"/><line x1="66" y1="24" x2="104" y2="24"/><line x1="66" y1="36" x2="100" y2="36"/><line x1="66" y1="48" x2="104" y2="48"/></g>
    <text x="24" y="70" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="18" fill="#e0873f">A</text>
    <text x="88" y="70" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="18" fill="#2f9db0">B</text>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">Kido Learn</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="#ffd166"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#ffe6cf">Interactive E-Learning for Kids</text>
</svg>
