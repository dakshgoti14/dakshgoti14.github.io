<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="Sales Prediction">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a2018"/><stop offset="0.5" stop-color="#124f37"/><stop offset="1" stop-color="#1f8055"/></linearGradient>
    <linearGradient id="s-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#04140d" stop-opacity="0"/><stop offset="1" stop-color="#04140d" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="s-panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/></linearGradient>
    <linearGradient id="s-panel2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/></linearGradient>
    <linearGradient id="s-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3ddc97"/><stop offset="1" stop-color="#8ef2c4"/></linearGradient>
    <linearGradient id="s-bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#124f37"/><stop offset="1" stop-color="#3ddc97"/></linearGradient>
    <linearGradient id="s-shirt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#14b8a6"/><stop offset="0.7" stop-color="#0f9d8e"/><stop offset="1" stop-color="#0b7d70"/></linearGradient>
    <linearGradient id="s-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#f2c199"/></linearGradient>
    <linearGradient id="s-fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3ddc97" stop-opacity="0.45"/><stop offset="1" stop-color="#3ddc97" stop-opacity="0"/></linearGradient>
    <radialGradient id="s-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#3ddc97" stop-opacity="0.5"/><stop offset="1" stop-color="#3ddc97" stop-opacity="0"/></radialGradient>
    <radialGradient id="s-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="s-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.045"/></pattern>
    <filter id="s-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#00140c" flood-opacity="0.42"/></filter>
    <filter id="s-soft2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#00140c" flood-opacity="0.35"/></filter>
    <filter id="s-blur"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="s-clip"><rect x="0" y="20" width="230" height="96"/></clipPath>
  </defs>

  <rect width="640" height="420" fill="url(#s-bg)"/>
  <circle cx="470" cy="150" r="165" fill="url(#s-glow)" filter="url(#s-blur)"/>
  <circle cx="120" cy="360" r="130" fill="url(#s-glow)" filter="url(#s-blur)" opacity="0.55"/>
  <rect width="640" height="420" fill="url(#s-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#s-floor)"/>
  <ellipse cx="185" cy="250" rx="150" ry="150" fill="url(#s-spot)"/>
  <path d="M40,250 A160,160 0 0 1 200,90" fill="none" stroke="#3ddc97" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="2 9" stroke-linecap="round"/>
  <g fill="#8ef2c4"><circle cx="330" cy="52" r="2.6" opacity="0.7"/><circle cx="612" cy="300" r="2.2" opacity="0.6"/><circle cx="60" cy="150" r="2" opacity="0.5"/></g>

  <!-- floating coins -->
  <g transform="translate(300,72)" filter="url(#s-soft2)">
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="#ffd166"/><ellipse cx="0" cy="-3" rx="22" ry="19" fill="#ffe08a"/>
    <text x="0" y="6" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="22" fill="#a97a12">$</text>
  </g>
  <g transform="translate(566,88)" filter="url(#s-soft2)"><ellipse cx="0" cy="0" rx="15" ry="15" fill="#ffd166"/><ellipse cx="0" cy="-2" rx="15" ry="13" fill="#ffe08a"/><text x="0" y="4" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="15" fill="#a97a12">$</text></g>

  <ellipse cx="176" cy="388" rx="120" ry="15" fill="#00140c" opacity="0.4"/>

  <!-- ===== Analyst character ===== -->
  <g filter="url(#s-soft)">
    <rect x="150" y="316" width="21" height="74" rx="9" fill="#1c3a30"/>
    <rect x="183" y="316" width="21" height="74" rx="9" fill="#264f42"/>
    <path d="M145,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0e231b"/>
    <path d="M178,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0e231b"/>
    <!-- shirt -->
    <path d="M138,214 C138,199 150,190 176,190 C202,190 214,199 214,214 L221,326 C221,335 213,341 204,341 L148,341 C139,341 131,335 131,326 Z" fill="url(#s-shirt)"/>
    <path d="M196,193 C208,197 214,205 214,214 L221,326 C221,335 213,341 204,341 L186,341 Z" fill="#0b7d70" opacity="0.5"/>
    <!-- collar -->
    <path d="M176,190 L162,214 L176,230 L190,214 Z" fill="#0b7d70"/>
    <path d="M176,192 L176,230" stroke="#0a6b60" stroke-width="2"/>
    <!-- pointing arm -->
    <path d="M210,224 C246,212 280,204 304,204" fill="none" stroke="url(#s-shirt)" stroke-width="21" stroke-linecap="round"/>
    <circle cx="310" cy="204" r="12" fill="url(#s-skin)"/><rect x="310" y="199" width="15" height="6" rx="3" fill="url(#s-skin)"/>
    <!-- resting arm -->
    <path d="M140,224 C129,250 129,286 141,312" fill="none" stroke="url(#s-shirt)" stroke-width="19" stroke-linecap="round"/>
    <circle cx="141" cy="316" r="11" fill="url(#s-skin)"/>
    <!-- neck + head -->
    <rect x="167" y="166" width="18" height="26" rx="7" fill="#f2c199"/>
    <circle cx="176" cy="148" r="31" fill="url(#s-skin)"/>
    <circle cx="147" cy="150" r="6" fill="#f2c199"/>
    <!-- hair -->
    <path d="M145,150 C143,120 163,108 176,108 C194,108 208,122 207,150 C201,132 190,126 176,126 C160,126 150,134 145,150 Z" fill="#1c130d"/>
    <path d="M150,146 C156,130 196,128 200,146 C200,132 192,120 176,120 C160,120 152,130 150,146 Z" fill="#2c1f16"/>
    <circle cx="167" cy="149" r="2.8" fill="#3a2a20"/><circle cx="185" cy="149" r="2.8" fill="#3a2a20"/>
    <path d="M162,141 q6,-4 11,-1" fill="none" stroke="#1c130d" stroke-width="2" stroke-linecap="round"/>
    <path d="M180,140 q5,-3 10,1" fill="none" stroke="#1c130d" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="164" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/><ellipse cx="188" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/>
    <path d="M169,161 q7,6 14,0" fill="none" stroke="#c07a4f" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== Revenue dashboard ===== -->
  <g transform="translate(322,138)" filter="url(#s-soft)">
    <rect x="0" y="0" width="278" height="192" rx="18" fill="url(#s-panel)" stroke="#3ddc97" stroke-opacity="0.35"/>
    <rect x="0" y="0" width="278" height="42" rx="18" fill="#ffffff" opacity="0.10"/>
    <circle cx="22" cy="21" r="6" fill="#3ddc97"/>
    <rect x="38" y="16" width="110" height="9" rx="4.5" fill="#ffffff" opacity="0.85"/>
    <g transform="translate(206,11)"><rect width="60" height="20" rx="10" fill="#3ddc97" opacity="0.25"/><path d="M12,20 l6,-10 l6,10" fill="none" stroke="#8ef2c4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="30" y="15" font-family="Poppins,Arial,sans-serif" font-size="11" fill="#d6fbe9">+27%</text></g>
    <!-- line chart with fill -->
    <g clip-path="url(#s-clip)" transform="translate(22,42)">
      <path d="M0,64 L48,50 L96,58 L144,32 L192,14 L228,6 L228,74 L0,74 Z" fill="url(#s-fill)"/>
      <polyline points="0,64 48,50 96,58 144,32 192,14 228,6" fill="none" stroke="url(#s-accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="144" cy="32" r="4" fill="#8ef2c4"/><circle cx="228" cy="6" r="4" fill="#8ef2c4"/>
    </g>
    <!-- bars -->
    <rect x="22" y="130" width="26" height="40" rx="5" fill="url(#s-bar)"/>
    <rect x="58" y="116" width="26" height="54" rx="5" fill="url(#s-bar)"/>
    <rect x="94" y="138" width="26" height="32" rx="5" fill="url(#s-bar)"/>
    <!-- KPI card -->
    <g transform="translate(150,120)"><rect width="110" height="52" rx="10" fill="#ffffff" opacity="0.10"/><text x="14" y="26" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="20" fill="#ffffff">$1.2M</text><text x="14" y="42" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#bff0d9">forecast revenue</text></g>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">Sales Prediction</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="url(#s-accent)"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#bff0d9">Forecasting with Machine Learning</text>
</svg>
