<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="MedInsight AI Healthcare Dashboard">
  <defs>
    <linearGradient id="m-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08243d"/><stop offset="0.5" stop-color="#0e5060"/><stop offset="1" stop-color="#159089"/></linearGradient>
    <linearGradient id="m-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#04141c" stop-opacity="0"/><stop offset="1" stop-color="#04141c" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="m-panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/></linearGradient>
    <linearGradient id="m-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5fd0e8"/><stop offset="1" stop-color="#89f7e0"/></linearGradient>
    <linearGradient id="m-bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#0e5060"/><stop offset="1" stop-color="#89f7e0"/></linearGradient>
    <linearGradient id="m-coat" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff"/><stop offset="0.7" stop-color="#eef8ff"/><stop offset="1" stop-color="#cfe6f2"/></linearGradient>
    <linearGradient id="m-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#f2c199"/></linearGradient>
    <linearGradient id="m-fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#89f7e0" stop-opacity="0.4"/><stop offset="1" stop-color="#89f7e0" stop-opacity="0"/></linearGradient>
    <radialGradient id="m-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#89f7e0" stop-opacity="0.5"/><stop offset="1" stop-color="#89f7e0" stop-opacity="0"/></radialGradient>
    <radialGradient id="m-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="m-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.045"/></pattern>
    <filter id="m-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#00131f" flood-opacity="0.42"/></filter>
    <filter id="m-soft2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#00131f" flood-opacity="0.35"/></filter>
    <filter id="m-blur"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="m-clip"><rect x="0" y="46" width="176" height="60"/></clipPath>
  </defs>

  <rect width="640" height="420" fill="url(#m-bg)"/>
  <circle cx="470" cy="150" r="165" fill="url(#m-glow)" filter="url(#m-blur)"/>
  <circle cx="120" cy="360" r="130" fill="url(#m-glow)" filter="url(#m-blur)" opacity="0.55"/>
  <rect width="640" height="420" fill="url(#m-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#m-floor)"/>
  <ellipse cx="185" cy="250" rx="150" ry="150" fill="url(#m-spot)"/>
  <g fill="#89f7e0"><circle cx="330" cy="52" r="2.6" opacity="0.7"/><circle cx="612" cy="300" r="2.2" opacity="0.6"/><circle cx="60" cy="150" r="2" opacity="0.5"/></g>

  <!-- AI chip badge -->
  <g transform="translate(300,74)" filter="url(#m-soft2)">
    <rect x="-22" y="-18" width="44" height="36" rx="9" fill="url(#m-panel)" stroke="#89f7e0" stroke-opacity="0.5"/>
    <rect x="-11" y="-8" width="22" height="16" rx="4" fill="#89f7e0"/>
    <g stroke="#89f7e0" stroke-width="2"><line x1="-16" y1="-4" x2="-22" y2="-4"/><line x1="-16" y1="4" x2="-22" y2="4"/><line x1="16" y1="-4" x2="22" y2="-4"/><line x1="16" y1="4" x2="22" y2="4"/></g>
    <text x="0" y="4" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="9" fill="#08243d">AI</text>
  </g>

  <ellipse cx="176" cy="388" rx="118" ry="15" fill="#00131f" opacity="0.4"/>

  <!-- ===== Clinician ===== -->
  <g filter="url(#m-soft)">
    <rect x="150" y="316" width="21" height="74" rx="9" fill="#1c3852"/>
    <rect x="183" y="316" width="21" height="74" rx="9" fill="#25506b"/>
    <path d="M145,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0e2334"/>
    <path d="M178,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0e2334"/>
    <path d="M134,214 C134,199 148,188 176,188 C204,188 218,199 218,214 L227,330 C227,339 219,345 209,345 L143,345 C133,345 125,339 125,330 Z" fill="url(#m-coat)"/>
    <path d="M196,192 C210,196 218,204 218,214 L227,330 C227,339 219,345 209,345 L188,345 Z" fill="#bcd8ea" opacity="0.5"/>
    <path d="M176,190 L158,236 L176,266 L194,236 Z" fill="#dcefff"/>
    <path d="M170,196 L176,268 L182,196 Z" fill="#2a9db0"/>
    <path d="M164,202 C156,234 158,256 176,262 C194,256 196,234 188,202" fill="none" stroke="#0e2334" stroke-width="4" stroke-linecap="round"/>
    <circle cx="176" cy="268" r="7.5" fill="#89f7e0" stroke="#0e2334" stroke-width="2.5"/>
    <path d="M212,222 C248,210 282,204 306,204" fill="none" stroke="url(#m-coat)" stroke-width="22" stroke-linecap="round"/>
    <circle cx="312" cy="204" r="12" fill="url(#m-skin)"/><rect x="312" y="199" width="16" height="6" rx="3" fill="url(#m-skin)"/>
    <path d="M140,224 C128,250 128,286 140,312" fill="none" stroke="url(#m-coat)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="140" cy="316" r="11" fill="url(#m-skin)"/>
    <rect x="167" y="164" width="18" height="26" rx="7" fill="#f2c199"/>
    <circle cx="176" cy="146" r="31" fill="url(#m-skin)"/>
    <circle cx="147" cy="148" r="6" fill="#f2c199"/>
    <path d="M144,150 C142,120 162,106 176,106 C194,106 208,120 208,148 C202,130 190,124 176,124 C160,124 150,132 144,150 Z" fill="#2b201a"/>
    <circle cx="167" cy="147" r="2.8" fill="#3a2a20"/><circle cx="185" cy="147" r="2.8" fill="#3a2a20"/>
    <path d="M162,139 q6,-4 11,-1" fill="none" stroke="#2b201a" stroke-width="2" stroke-linecap="round"/>
    <path d="M180,138 q5,-3 10,1" fill="none" stroke="#2b201a" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="164" cy="156" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/><ellipse cx="188" cy="156" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/>
    <path d="M169,159 q7,6 14,0" fill="none" stroke="#c07a4f" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== AI dashboard ===== -->
  <g transform="translate(322,138)" filter="url(#m-soft)">
    <rect x="0" y="0" width="278" height="192" rx="18" fill="url(#m-panel)" stroke="#89f7e0" stroke-opacity="0.35"/>
    <rect x="0" y="0" width="278" height="42" rx="18" fill="#ffffff" opacity="0.10"/>
    <circle cx="22" cy="21" r="6" fill="#89f7e0"/>
    <rect x="38" y="16" width="120" height="9" rx="4.5" fill="#ffffff" opacity="0.85"/>
    <text x="214" y="26" font-family="Poppins,Arial,sans-serif" font-size="12" fill="#bfe9e1">Live · 94%</text>
    <!-- patient trend line -->
    <g clip-path="url(#m-clip)" transform="translate(20,42)">
      <path d="M0,86 L44,70 L88,80 L132,54 L176,42 L176,106 L0,106 Z" fill="url(#m-fill)"/>
      <polyline points="0,86 44,70 88,80 132,54 176,42" fill="none" stroke="url(#m-accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="176" cy="42" r="4" fill="#89f7e0"/>
    </g>
    <!-- AI summary card -->
    <g transform="translate(206,52)">
      <rect width="54" height="96" rx="10" fill="#ffffff" opacity="0.10"/>
      <circle cx="16" cy="18" r="8" fill="#89f7e0"/><path d="M12,18 l3,3 l6,-6" fill="none" stroke="#08243d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="8" y="36" width="38" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
      <rect x="8" y="48" width="30" height="6" rx="3" fill="#ffffff" opacity="0.45"/>
      <rect x="8" y="60" width="38" height="6" rx="3" fill="#ffffff" opacity="0.45"/>
      <rect x="8" y="72" width="24" height="6" rx="3" fill="#ffffff" opacity="0.45"/>
    </g>
    <!-- bars -->
    <rect x="20" y="130" width="24" height="42" rx="5" fill="url(#m-bar)"/>
    <rect x="52" y="112" width="24" height="60" rx="5" fill="url(#m-bar)"/>
    <rect x="84" y="140" width="24" height="32" rx="5" fill="url(#m-bar)"/>
    <!-- stat -->
    <g transform="translate(130,120)"><text x="0" y="24" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="24" fill="#ffffff">50K+</text><text x="0" y="42" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#bfe9e1">records / day · 40% faster</text></g>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">MedInsight</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="url(#m-accent)"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#bfe9e1">AI-Enabled Healthcare Dashboard</text>
</svg>
