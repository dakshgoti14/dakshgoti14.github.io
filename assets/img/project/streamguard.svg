<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="StreamGuard Real-Time Fraud Detection">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08161a"/><stop offset="0.5" stop-color="#0d2c26"/><stop offset="1" stop-color="#123c2f"/></linearGradient>
    <linearGradient id="r-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#040c0a" stop-opacity="0"/><stop offset="1" stop-color="#040c0a" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="r-panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="r-wave" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3ddc97"/><stop offset="1" stop-color="#7ef0c0"/></linearGradient>
    <linearGradient id="r-shirt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3ddc97"/><stop offset="0.7" stop-color="#25b378"/><stop offset="1" stop-color="#1c9463"/></linearGradient>
    <linearGradient id="r-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#f2c199"/></linearGradient>
    <linearGradient id="r-fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3ddc97" stop-opacity="0.4"/><stop offset="1" stop-color="#3ddc97" stop-opacity="0"/></linearGradient>
    <radialGradient id="r-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#3ddc97" stop-opacity="0.45"/><stop offset="1" stop-color="#3ddc97" stop-opacity="0"/></radialGradient>
    <radialGradient id="r-red" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ff5c7a" stop-opacity="0.9"/><stop offset="1" stop-color="#ff5c7a" stop-opacity="0"/></radialGradient>
    <radialGradient id="r-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="r-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05"/></pattern>
    <filter id="r-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#040c0a" flood-opacity="0.45"/></filter>
    <filter id="r-blur"><feGaussianBlur stdDeviation="16"/></filter>
    <clipPath id="r-clip"><rect x="0" y="20" width="248" height="70"/></clipPath>
  </defs>

  <rect width="640" height="420" fill="url(#r-bg)"/>
  <circle cx="450" cy="160" r="160" fill="url(#r-glow)" filter="url(#r-blur)"/>
  <circle cx="110" cy="360" r="120" fill="url(#r-glow)" filter="url(#r-blur)" opacity="0.55"/>
  <rect width="640" height="420" fill="url(#r-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#r-floor)"/>
  <ellipse cx="150" cy="250" rx="140" ry="150" fill="url(#r-spot)"/>
  <g fill="#7ef0c0"><circle cx="330" cy="56" r="2.6" opacity="0.7"/><circle cx="612" cy="300" r="2.2" opacity="0.6"/><circle cx="60" cy="150" r="2" opacity="0.5"/></g>

  <ellipse cx="168" cy="388" rx="115" ry="15" fill="#040c0a" opacity="0.4"/>

  <!-- ===== Analyst ===== -->
  <g filter="url(#r-soft)">
    <rect x="142" y="316" width="21" height="74" rx="9" fill="#173a2e"/>
    <rect x="175" y="316" width="21" height="74" rx="9" fill="#1f5040"/>
    <path d="M137,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0c231b"/>
    <path d="M170,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#0c231b"/>
    <path d="M130,214 C130,199 142,190 168,190 C194,190 206,199 206,214 L213,326 C213,335 205,341 196,341 L140,341 C131,341 123,335 123,326 Z" fill="url(#r-shirt)"/>
    <path d="M188,193 C200,197 206,205 206,214 L213,326 C213,335 205,341 196,341 L178,341 Z" fill="#1c9463" opacity="0.5"/>
    <path d="M168,190 L154,214 L168,230 L182,214 Z" fill="#1c9463"/>
    <path d="M204,224 C240,214 274,210 300,214" fill="none" stroke="url(#r-shirt)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="306" cy="214" r="11" fill="url(#r-skin)"/><rect x="306" y="209" width="15" height="6" rx="3" fill="url(#r-skin)"/>
    <path d="M132,224 C121,250 121,286 133,312" fill="none" stroke="url(#r-shirt)" stroke-width="19" stroke-linecap="round"/>
    <circle cx="133" cy="316" r="11" fill="url(#r-skin)"/>
    <rect x="159" y="166" width="18" height="26" rx="7" fill="#f2c199"/>
    <circle cx="168" cy="148" r="31" fill="url(#r-skin)"/>
    <circle cx="139" cy="150" r="6" fill="#f2c199"/>
    <path d="M137,150 C135,120 155,108 168,108 C186,108 200,122 199,150 C193,132 182,126 168,126 C152,126 142,134 137,150 Z" fill="#1a1810"/>
    <circle cx="159" cy="149" r="2.8" fill="#3a2a20"/><circle cx="177" cy="149" r="2.8" fill="#3a2a20"/>
    <path d="M154,141 q6,-4 11,-1" fill="none" stroke="#1a1810" stroke-width="2" stroke-linecap="round"/>
    <path d="M172,140 q5,-3 10,1" fill="none" stroke="#1a1810" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="156" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/><ellipse cx="180" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/>
    <path d="M161,161 q7,6 14,0" fill="none" stroke="#c07a4f" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- ===== Fraud monitor panel ===== -->
  <g transform="translate(300,122)" filter="url(#r-soft)">
    <rect x="0" y="0" width="300" height="206" rx="18" fill="url(#r-panel)" stroke="#3ddc97" stroke-opacity="0.3"/>
    <rect x="0" y="0" width="300" height="38" rx="18" fill="#ffffff" opacity="0.07"/>
    <circle cx="20" cy="19" r="5" fill="#3ddc97"/><rect x="34" y="14" width="120" height="9" rx="4.5" fill="#ffffff" opacity="0.8"/>
    <g transform="translate(232,10)"><rect width="52" height="20" rx="10" fill="#ff5c7a" opacity="0.3"/><circle cx="12" cy="10" r="4" fill="#ff5c7a"/><text x="22" y="14" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#ffd0d9">alert</text></g>
    <!-- transaction stream -->
    <g clip-path="url(#r-clip)" transform="translate(26,42)">
      <path d="M0,60 L40,58 L60,26 L82,84 L104,50 L132,58 L160,30 L186,80 L214,46 L248,60 L248,90 L0,90 Z" fill="url(#r-fill)"/>
      <polyline points="0,60 40,58 60,26 82,84 104,50 132,58 160,30 186,80 214,46 248,60" fill="none" stroke="url(#r-wave)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="82" cy="84" r="9" fill="url(#r-red)"/><circle cx="82" cy="84" r="4.5" fill="#ff5c7a"/>
      <circle cx="186" cy="80" r="9" fill="url(#r-red)"/><circle cx="186" cy="80" r="4.5" fill="#ff5c7a"/>
      <circle cx="60" cy="26" r="3.5" fill="#3ddc97"/><circle cx="160" cy="30" r="3.5" fill="#3ddc97"/>
    </g>
    <!-- pipeline chips -->
    <g transform="translate(26,150)" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#ffffff">
      <rect width="66" height="26" rx="7" fill="#ffffff" opacity="0.10"/><text x="33" y="17" text-anchor="middle">Kafka</text>
      <rect x="82" width="80" height="26" rx="7" fill="#ffffff" opacity="0.10"/><text x="122" y="17" text-anchor="middle">ML score</text>
      <rect x="176" width="66" height="26" rx="7" fill="#ff5c7a" opacity="0.25"/><text x="209" y="17" text-anchor="middle">Block</text>
      <path d="M66,13 h14" stroke="#3ddc97" stroke-width="2.4"/><path d="M162,13 h12" stroke="#3ddc97" stroke-width="2.4"/>
    </g>
    <g transform="translate(26,184)"><text x="0" y="12" font-family="Poppins,Arial,sans-serif" font-size="11" fill="#7fd8b4">1M+ events/hr · 98% precision · Kafka · Spark · AWS</text></g>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">StreamGuard</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="url(#r-wave)"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#a9e6cf">Real-Time Fraud Detection Pipeline</text>
</svg>
