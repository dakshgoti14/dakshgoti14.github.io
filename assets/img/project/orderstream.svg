<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="OrderStream Distributed System">
  <defs>
    <linearGradient id="o-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12132b"/><stop offset="0.5" stop-color="#241a44"/><stop offset="1" stop-color="#3a1f5c"/></linearGradient>
    <linearGradient id="o-floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0818" stop-opacity="0"/><stop offset="1" stop-color="#0a0818" stop-opacity="0.55"/></linearGradient>
    <linearGradient id="o-panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="o-part" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#b9a7ff"/></linearGradient>
    <linearGradient id="o-shirt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9d86ff"/><stop offset="0.7" stop-color="#7c5cff"/><stop offset="1" stop-color="#5f3fe0"/></linearGradient>
    <linearGradient id="o-skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#f2c199"/></linearGradient>
    <radialGradient id="o-glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7c5cff" stop-opacity="0.5"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></radialGradient>
    <radialGradient id="o-spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="o-grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05"/></pattern>
    <filter id="o-soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a0818" flood-opacity="0.45"/></filter>
    <filter id="o-soft2" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0a0818" flood-opacity="0.35"/></filter>
    <filter id="o-blur"><feGaussianBlur stdDeviation="20"/></filter>
    <marker id="o-arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b9a7ff"/></marker>
  </defs>

  <rect width="640" height="420" fill="url(#o-bg)"/>
  <circle cx="440" cy="170" r="160" fill="url(#o-glow)" filter="url(#o-blur)"/>
  <circle cx="110" cy="360" r="120" fill="url(#o-glow)" filter="url(#o-blur)" opacity="0.55"/>
  <rect width="640" height="420" fill="url(#o-grid)"/>
  <rect y="300" width="640" height="120" fill="url(#o-floor)"/>
  <ellipse cx="150" cy="250" rx="140" ry="150" fill="url(#o-spot)"/>
  <g fill="#b9a7ff"><circle cx="330" cy="60" r="2.6" opacity="0.7"/><circle cx="600" cy="300" r="2.2" opacity="0.6"/><circle cx="60" cy="150" r="2" opacity="0.5"/></g>

  <ellipse cx="168" cy="388" rx="115" ry="15" fill="#0a0818" opacity="0.4"/>

  <!-- ===== Engineer with headset ===== -->
  <g filter="url(#o-soft)">
    <rect x="142" y="316" width="21" height="74" rx="9" fill="#241c3a"/>
    <rect x="175" y="316" width="21" height="74" rx="9" fill="#31264c"/>
    <path d="M137,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#140e24"/>
    <path d="M170,384 h32 a5,5 0 0 1 5,5 v4 h-42 v-4 a5,5 0 0 1 5,-5 Z" fill="#140e24"/>
    <path d="M130,214 C130,199 142,190 168,190 C194,190 206,199 206,214 L213,326 C213,335 205,341 196,341 L140,341 C131,341 123,335 123,326 Z" fill="url(#o-shirt)"/>
    <path d="M188,193 C200,197 206,205 206,214 L213,326 C213,335 205,341 196,341 L178,341 Z" fill="#5f3fe0" opacity="0.5"/>
    <path d="M168,190 L154,214 L168,230 L182,214 Z" fill="#5f3fe0"/>
    <path d="M204,224 C240,214 274,208 300,210" fill="none" stroke="url(#o-shirt)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="306" cy="210" r="11" fill="url(#o-skin)"/><rect x="306" y="205" width="15" height="6" rx="3" fill="url(#o-skin)"/>
    <path d="M132,224 C121,250 121,286 133,312" fill="none" stroke="url(#o-shirt)" stroke-width="19" stroke-linecap="round"/>
    <circle cx="133" cy="316" r="11" fill="url(#o-skin)"/>
    <rect x="159" y="166" width="18" height="26" rx="7" fill="#f2c199"/>
    <circle cx="168" cy="148" r="31" fill="url(#o-skin)"/>
    <path d="M137,150 C135,120 155,108 168,108 C186,108 200,122 199,150 C193,132 182,126 168,126 C152,126 142,134 137,150 Z" fill="#221528"/>
    <circle cx="159" cy="149" r="2.8" fill="#3a2a20"/><circle cx="177" cy="149" r="2.8" fill="#3a2a20"/>
    <path d="M154,141 q6,-4 11,-1" fill="none" stroke="#221528" stroke-width="2" stroke-linecap="round"/>
    <path d="M172,140 q5,-3 10,1" fill="none" stroke="#221528" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="156" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/><ellipse cx="180" cy="158" rx="4" ry="2.6" fill="#ff9f7e" opacity="0.5"/>
    <path d="M161,161 q7,6 14,0" fill="none" stroke="#c07a4f" stroke-width="2.4" stroke-linecap="round"/>
    <!-- headset -->
    <path d="M138,150 C138,124 198,124 198,150" fill="none" stroke="#140e24" stroke-width="4"/>
    <rect x="134" y="146" width="10" height="16" rx="4" fill="#140e24"/>
    <path d="M136,162 C130,172 138,182 150,178" fill="none" stroke="#140e24" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="151" cy="178" r="4" fill="#b9a7ff"/>
  </g>

  <!-- ===== Kafka pipeline panel ===== -->
  <g transform="translate(300,128)" filter="url(#o-soft)">
    <rect x="0" y="0" width="300" height="200" rx="18" fill="url(#o-panel)" stroke="#7c5cff" stroke-opacity="0.32"/>
    <rect x="0" y="0" width="300" height="38" rx="18" fill="#ffffff" opacity="0.08"/>
    <circle cx="20" cy="19" r="5" fill="#b9a7ff"/><rect x="34" y="14" width="110" height="9" rx="4.5" fill="#ffffff" opacity="0.8"/>
    <!-- producer -->
    <g transform="translate(18,58)"><rect width="70" height="52" rx="10" fill="#ffffff" opacity="0.10"/><circle cx="18" cy="20" r="8" fill="url(#o-part)"/><rect x="32" y="16" width="30" height="7" rx="3.5" fill="#ffffff" opacity="0.7"/><text x="35" y="44" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#c9bff5">Orders</text></g>
    <!-- broker -->
    <g transform="translate(115,52)"><rect width="72" height="96" rx="12" fill="#ffffff" opacity="0.10"/><text x="36" y="18" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="12" fill="#b9a7ff">Kafka</text><rect x="12" y="26" width="48" height="16" rx="4" fill="url(#o-part)"/><rect x="12" y="48" width="48" height="16" rx="4" fill="url(#o-part)" opacity="0.8"/><rect x="12" y="70" width="48" height="16" rx="4" fill="url(#o-part)"/></g>
    <!-- consumers -->
    <g transform="translate(214,52)" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#ffffff"><rect y="0" width="70" height="26" rx="7" fill="#ffffff" opacity="0.10"/><text x="35" y="17" text-anchor="middle">Pharmacy</text><rect y="34" width="70" height="26" rx="7" fill="#ffffff" opacity="0.10"/><text x="35" y="51" text-anchor="middle">Labs</text><rect y="68" width="70" height="26" rx="7" fill="#ffffff" opacity="0.10"/><text x="35" y="85" text-anchor="middle">Insurers</text></g>
    <line x1="88" y1="84" x2="113" y2="90" stroke="url(#o-part)" stroke-width="2.6" marker-end="url(#o-arrow)"/>
    <line x1="187" y1="72" x2="212" y2="65" stroke="url(#o-part)" stroke-width="2.6" marker-end="url(#o-arrow)"/>
    <line x1="187" y1="100" x2="212" y2="99" stroke="url(#o-part)" stroke-width="2.6" marker-end="url(#o-arrow)"/>
    <line x1="187" y1="128" x2="212" y2="133" stroke="url(#o-part)" stroke-width="2.6" marker-end="url(#o-arrow)"/>
    <!-- stats -->
    <g transform="translate(18,160)"><text x="0" y="16" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="18" fill="#b9a7ff">200K+</text><text x="0" y="32" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#c9bff5">orders / day</text></g>
    <g transform="translate(150,160)"><text x="0" y="16" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="18" fill="#ffffff">&lt;200ms</text><text x="0" y="32" font-family="Poppins,Arial,sans-serif" font-size="10" fill="#c9bff5">latency · FHIR · K8s</text></g>
  </g>

  <text x="40" y="58" font-family="Poppins,Arial,sans-serif" font-weight="700" font-size="30" fill="#ffffff">OrderStream</text>
  <rect x="40" y="68" width="54" height="3" rx="1.5" fill="url(#o-part)"/>
  <text x="40" y="92" font-family="Poppins,Arial,sans-serif" font-size="14.5" fill="#c9bff5">Distributed Order Management System</text>
</svg>
